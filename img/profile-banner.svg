<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Nguyen Thanh An GitHub Profile Banner</title>
  <desc id="desc">Professional GitHub profile banner for Nguyen Thanh An, HiTechCloud, HiTechAI and Vietnam API Sharing Community.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111F"/>
      <stop offset="0.34" stop-color="#0B2A4A"/>
      <stop offset="0.68" stop-color="#0E496C"/>
      <stop offset="1" stop-color="#0B132B"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(230 80) rotate(45) scale(360 220)">
      <stop stop-color="#37D5FF" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#37D5FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 300) rotate(45) scale(360 220)">
      <stop stop-color="#8B5CF6" stop-opacity="0.52"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stroke" x1="90" y1="94" x2="1110" y2="326" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#A78BFA" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#020617" flood-opacity="0.55"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#FFFFFF" stroke-opacity="0.055"/>
    </pattern>
  </defs>

  <rect width="1200" height="420" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="34" fill="url(#grid)"/>
  <rect width="1200" height="420" rx="34" fill="url(#glowA)"/>
  <rect width="1200" height="420" rx="34" fill="url(#glowB)"/>

  <g opacity="0.28">
    <circle cx="106" cy="90" r="5" fill="#67E8F9"/>
    <circle cx="190" cy="318" r="4" fill="#A7F3D0"/>
    <circle cx="1024" cy="84" r="5" fill="#C4B5FD"/>
    <circle cx="1102" cy="252" r="4" fill="#22C55E"/>
    <path d="M88 335C216 245 329 376 466 272C603 168 721 294 847 188C949 102 1030 133 1112 80" stroke="#67E8F9" stroke-opacity="0.32" stroke-width="2"/>
    <path d="M96 114C230 180 315 68 454 138C617 220 704 88 860 150C972 195 1045 165 1120 126" stroke="#A78BFA" stroke-opacity="0.28" stroke-width="2"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="84" y="66" width="1032" height="288" rx="28" fill="#020617" fill-opacity="0.47" stroke="url(#stroke)" stroke-width="2"/>
    <rect x="108" y="92" width="7" height="236" rx="3.5" fill="#67E8F9"/>
    <text x="140" y="145" fill="#E0F2FE" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="4">NGUYEN THANH AN</text>
    <text x="140" y="205" fill="#FFFFFF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="48" font-weight="800">Cloud • AI • DevTools • Open Source</text>
    <text x="142" y="253" fill="#BAE6FD" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="22" font-weight="500">Chairman &amp; CEO, Pho Tue Software Solutions JSC</text>
    <text x="142" y="288" fill="#C4B5FD" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="20" font-weight="500">HiTechCloud · HiTechAI VN · Vietnam API Sharing Community</text>

    <g transform="translate(824 113)">
      <rect x="0" y="0" width="228" height="170" rx="24" fill="#081627" stroke="#38BDF8" stroke-opacity="0.45"/>
      <path d="M114 28L181 66V142L114 180L47 142V66L114 28Z" fill="#0EA5E9" fill-opacity="0.15" stroke="#67E8F9" stroke-width="3"/>
      <path d="M76 78H152M76 112H152M76 146H128" stroke="#E0F2FE" stroke-width="10" stroke-linecap="round"/>
      <circle cx="172" cy="145" r="20" fill="#22C55E"/>
      <path d="M162 145L170 153L184 136" stroke="#052E16" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
