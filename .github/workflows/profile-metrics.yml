name: Update profile languages and tech stack

on:
  schedule:
    - cron: "20 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/update_profile_metrics.py"
      - ".github/workflows/profile-metrics.yml"
      - "README.md"

permissions:
  contents: write

jobs:
  update-profile-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate dynamic languages and tech stack
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_profile_metrics.py

      - name: Commit updated README
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-update profile languages and tech stack"
          file_pattern: README.md
